    <meta charset="UTF-8">

    <title>Check-in Evento</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #00e676;
            --text: #ffffff;
            --text-sec: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }
        header {
            position: sticky;
            top: 0;
            background-color: var(--bg);
            padding: 15px;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--surface);
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }
        .guest-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .guest-card {
            background-color: var(--surface);
            margin: 10px 15px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .guest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .guest-name {
            font-size: 18px;
            font-weight: bold;
        }
        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #444;
        }
        .badge.paid { background: rgba(0, 230, 118, 0.2); color: var(--primary); }
        .controls {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            padding-top: 10px;
            margin-top: 5px;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-sec);
        }
        /* Stile Toggle Switch per Mobile */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }
        .note {
            font-size: 12px;
            color: #ff9800;
            font-style: italic;
        }
        .done { opacity: 0.5; }
    </style>

        let guests = [];

        // Inizializzazione
        function init() {
            // Se c'è un salvataggio precedente, usalo. Altrimenti parsiamo il CSV.
            const savedData = localStorage.getItem('guestListState');
            if (savedData) {
                guests = JSON.parse(savedData);
            } else {
                parseCSV(csvData);
            }
            renderList();
        }

        // Convertiamo il CSV in Array JS
        function parseCSV(data) {
            const lines = data.trim().split('\n');
            const headers = lines[0].split(',');
            
            for(let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(',');
                if(currentline[0]) {
                    guests.push({
                        id: i,
                        nome: currentline[0] || "",
                        pagato: currentline[2] === "TRUE" || currentline[2] === "true",
                        presenza: false,
                        gettone: false,
                        note: currentline[5] || ""
                    });
                }
            }
        }

        // Mostra la lista a schermo
        function renderList(filterText = "") {
            const ul = document.getElementById('list');
            ul.innerHTML = '';

            guests.forEach(guest => {
                if(guest.nome.toLowerCase().includes(filterText.toLowerCase())) {
                    const isDone = guest.presenza && guest.gettone ? "done" : "";
                    const paidBadge = guest.pagato ? '<span class="badge paid">PAGATO</span>' : '<span class="badge">NON PAGATO</span>';
                    const notes = guest.note ? `<div class="note">⚠️ Note: ${guest.note}</div>` : '';

                    ul.innerHTML += `
                        <li class="guest-card ${isDone}">
                            <div class="guest-header">
                                <span class="guest-name">${guest.nome}</span>
                                ${paidBadge}
                            </div>
                            ${notes}
                            <div class="controls">
                                <label class="toggle-label">
                                    Presenza
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'presenza')" ${guest.presenza ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                                <label class="toggle-label">
                                    Gettone
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'gettone')" ${guest.gettone ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                            </div>
                        </li>
                    `;
                }
            });
        }

        // Funzione di ricerca
        function filterList() {
            const search = document.getElementById('search').value;
            renderList(search);
        }

        // Salva lo stato delle spunte e aggiorna la memoria del telefono
        function toggleState(id, field) {
            const guest = guests.find(g => g.id === id);
            guest[field] = !guest[field];
            localStorage.setItem('guestListState', JSON.stringify(guests));
            
            // Ricarica la lista per applicare l'effetto "opaco" se ha preso tutto
            const search = document.getElementById('search').value;
            renderList(search);
        }

        // Fai partire l'app
        init();
