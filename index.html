<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in Evento</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #00e676;
            --text: #ffffff;
            --text-sec: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }
        #status-bar {
            background-color: #ff9800;
            color: #000;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
        }
        #status-bar.online { background-color: var(--primary); }
        #status-bar.error { background-color: #f44336; color: white; }
        
        header {
            position: sticky;
            top: 0;
            background-color: var(--bg);
            padding: 15px 15px 0 15px;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        .header-top {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--surface);
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-add {
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-add:active { opacity: 0.8; }
        
        /* Design dei TABS */
        .tabs {
            display: flex;
            width: 100%;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-sec);
            border: none;
            border-bottom: 3px solid transparent;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        /* Design dei gruppi per Lettera (Accordion) */
        .letter-group {
            margin: 15px;
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }
        .letter-group summary {
            background-color: #252525;
            color: var(--primary);
            padding: 12px 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .letter-group summary::-webkit-details-marker { display: none; }
        .letter-group summary::after {
            content: "▼";
            font-size: 12px;
            color: #777;
        }
        .letter-group[open] summary::after { content: "▲"; color: var(--primary); }
        .letter-group ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .guest-card {
            background-color: var(--surface);
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .guest-header { display: flex; justify-content: space-between; align-items: center; }
        .guest-name { font-size: 18px; font-weight: bold; }
        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #444; 
            color: #ccc;
            cursor: pointer;
            user-select: none;
        }
        .badge.paid { background: rgba(0, 230, 118, 0.2); color: var(--primary); }
        .badge.org { background: rgba(33, 150, 243, 0.2); color: #2196f3; cursor: default; }
        .controls {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            padding-top: 10px;
            margin-top: 5px;
        }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-sec); }
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }
        .note { font-size: 12px; color: #ff9800; font-style: italic; }
        .not-coming { font-size: 12px; color: #f44336; font-weight: bold; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #666; font-style: italic; }
    </style>
</head>

        let guests = [];
        let isOnline = false;
        let firebaseTimeout;
        let currentTab = 'todo'; // 'todo' o 'done'

        function init() {
            if (typeof firebase === 'undefined') {
                setOfflineFallback("⚠️ Rete bloccata: Modalità Offline Attiva");
                return;
            }

            firebaseTimeout = setTimeout(() => {
                if (!isOnline) { setOfflineFallback("⚠️ Timeout Rete: Modalità Offline (No Sync)"); }
            }, 2000);

            try {
                firebase.initializeApp(firebaseConfig);
                const database = firebase.database();

                database.ref('guests').on('value', (snapshot) => {
                    clearTimeout(firebaseTimeout);
                    isOnline = true;
                    
                    const statusBar = document.getElementById('status-bar');
                    statusBar.innerText = "🟢 CLOUD SINCRONIZZATO";
                    statusBar.className = "online";

                    const data = snapshot.val();
                    if (data) {
                        guests = Object.keys(data).map(key => data[key]);
                    } else {
                        parseCSV(csvData);
                        const initialData = {};
                        guests.forEach(g => { initialData[g.id] = g; });
                        database.ref('guests').set(initialData);
                    }
                    renderList();
                }, (error) => {
                    clearTimeout(firebaseTimeout);
                    setOfflineFallback("⛔ ERRORE FIREBASE: " + error.code);
                });
            } catch (e) {
                setOfflineFallback("⚠️ Errore Init - Modalità Offline Attiva");
            }
        }

        function setOfflineFallback(message) {
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = message;
            statusBar.className = "error";
            
            const saved = localStorage.getItem('localGuestBackup');
            if (saved) { guests = JSON.parse(saved); } 
            else { parseCSV(csvData); }
            renderList();
        }

        function parseCSV(data) {
            guests = [];
            const lines = data.trim().split('\n');
            for(let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(';'); 
                if(currentline[0]) {
                    const isPaid = (currentline[2] === "True" || currentline[2] === "VERO" || currentline[2] === "true" || currentline[2] === "TRUE");
                    const isOrg = (currentline[2] === "ORG");
                    const notComing = (currentline[3] && currentline[3].trim().toLowerCase() === "non viene");
                    
                    guests.push({
                        id: i,
                        nome: currentline[0] || "",
                        pagato: isPaid,
                        org: isOrg,
                        presenza: false,
                        gettone: false,
                        note: currentline[5] || "",
                        nonViene: notComing
                    });
                }
            }
        }

        function addGuest() {
            const name = prompt("Inserisci il Cognome e Nome del ritardatario:");
            if (name && name.trim() !== "") {
                const newId = Date.now();
                const newGuest = {
                    id: newId,
                    nome: name,
                    pagato: false,
                    org: false,
                    presenza: true,
                    gettone: false,
                    note: "Aggiunto all'ingresso",
                    nonViene: false
                };

                if (isOnline) { firebase.database().ref('guests/' + newId).set(newGuest); } 
                else {
                    guests.unshift(newGuest);
                    localStorage.setItem('localGuestBackup', JSON.stringify(guests));
                    renderList();
                }
                document.getElementById('search').value = "";
            }
        }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            renderList(document.getElementById('search').value);
        }

        function renderList(filterText = "") {
            const container = document.getElementById('list-container');
            
            // Prima di cancellare l'HTML, ci salviamo quali gruppi erano aperti
            const currentlyOpenDetails = Array.from(document.querySelectorAll('details[open]')).map(d => d.getAttribute('data-letter'));
            
            container.innerHTML = '';

            // 1. Filtriamo in base al testo E al TAB selezionato
            let filteredGuests = guests.filter(guest => {
                const matchesSearch = guest.nome.toLowerCase().includes(filterText.toLowerCase());
                const matchesTab = currentTab === 'done' ? guest.gettone : !guest.gettone;
                return matchesSearch && matchesTab;
            });

            // 2. Ordiniamo alfabeticamente
            filteredGuests.sort((a, b) => a.nome.localeCompare(b.nome));

            // 3. Raggruppiamo per Lettera Iniziale
            const groups = {};
            filteredGuests.forEach(guest => {
                let letter = guest.nome.charAt(0).toUpperCase();
                if (!letter.match(/[A-Z]/)) letter = "#"; 
                if (!groups[letter]) groups[letter] = [];
                groups[letter].push(guest);
            });

            // Stato vuoto (se il tab non ha nessuno o la ricerca non trova niente)
            if (filteredGuests.length === 0) {
                const msg = currentTab === 'todo' ? "Tutti smarcati o nessun risultato trovato. 🎉" : "Nessuno ha ancora ricevuto il gettone.";
                container.innerHTML = `<div class="empty-state">${msg}</div>`;
                return;
            }

            // 4. Disegniamo i gruppi
            for (const letter of Object.keys(groups).sort()) {
                
                // LOGICA DI APERTURA: 
                // È aperto se c'è testo nella ricerca OPPURE se l'utente lo aveva lasciato aperto!
                const isAutoOpen = (filterText.trim() !== "" || currentlyOpenDetails.includes(letter)) ? "open" : "";

                let groupHTML = `
                    <details class="letter-group" data-letter="${letter}" ${isAutoOpen}>
                        <summary>${letter} <span style="font-size:12px; font-weight:normal;">(${groups[letter].length} persone)</span></summary>
                        <ul>
                `;

                groups[letter].forEach(guest => {
                    let badgeHTML = `<span class="badge" onclick="togglePayment(${guest.id})">NON PAGATO</span>`;
                    if (guest.pagato) badgeHTML = `<span class="badge paid" onclick="togglePayment(${guest.id})">PAGATO</span>`;
                    if (guest.org) badgeHTML = '<span class="badge org">STAFF/ORG</span>';

                    let notesHTML = '';
                    if (guest.note) notesHTML += `<div class="note">⚠️ Note: ${guest.note}</div>`;
                    if (guest.nonViene) notesHTML += `<div class="not-coming">❌ Segnato come: non viene</div>`;

                    groupHTML += `
                        <li class="guest-card">
                            <div class="guest-header">
                                <span class="guest-name">${guest.nome}</span>
                                ${badgeHTML}
                            </div>
                            ${notesHTML}
                            <div class="controls">
                                <label class="toggle-label">
                                    Presenza
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'presenza')" ${guest.presenza ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                                <label class="toggle-label">
                                    Gettone
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'gettone')" ${guest.gettone ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                            </div>
                        </li>
                    `;
                });
                
                groupHTML += `</ul></details>`;
                container.innerHTML += groupHTML;
            }
        }

        function filterList() {
            const search = document.getElementById('search').value;
            renderList(search);
        }

        function toggleState(id, field) {
            const guest = guests.find(g => g.id == id);
            if (guest) {
                const newValue = !guest[field];
                if (isOnline) {
                    firebase.database().ref('guests/' + id + '/' + field).set(newValue);
                } else {
                    guest[field] = newValue;
                    localStorage.setItem('localGuestBackup', JSON.stringify(guests));
                    renderList(document.getElementById('search').value);
                }
            }
        }

        function togglePayment(id) {
            const guest = guests.find(g => g.id == id);
            if (guest && !guest.org) {
                const newValue = !guest.pagato;
                if (isOnline) {
                    firebase.database().ref('guests/' + id + '/pagato').set(newValue);
                } else {
                    guest.pagato = newValue;
                    localStorage.setItem('localGuestBackup', JSON.stringify(guests));
                    renderList(document.getElementById('search').value);
                }
            }
        }

        init();
    </script>
</body>
</html>
