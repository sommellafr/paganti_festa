    <title>Check-in Evento</title>

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #00e676;
            --text: #ffffff;
            --text-sec: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }
        header {
            position: sticky;
            top: 0;
            background-color: var(--bg);
            padding: 15px;
            border-bottom: 1px solid #333;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--surface);
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-add {
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-add:active { opacity: 0.8; }
        .guest-list { list-style: none; padding: 0; margin: 0; }
        .guest-card {
            background-color: var(--surface);
            margin: 10px 15px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .guest-header { display: flex; justify-content: space-between; align-items: center; }
        .guest-name { font-size: 18px; font-weight: bold; }
        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #444; 
            color: #ccc;
            cursor: pointer;
            user-select: none;
        }
        .badge.paid { background: rgba(0, 230, 118, 0.2); color: var(--primary); }
        .badge.org { background: rgba(33, 150, 243, 0.2); color: #2196f3; cursor: default; }
        .controls {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            padding-top: 10px;
            margin-top: 5px;
        }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-sec); }
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }
        .note { font-size: 12px; color: #ff9800; font-style: italic; }
        .not-coming { font-size: 12px; color: #f44336; font-weight: bold; }
        .done { opacity: 0.3; border: 1px solid #2a2a2a; background-color: #161616; }
    </style>
</head>

        let guests = [];

        function init() {
            // Ascolta i dati da Firebase in tempo reale
            database.ref('guests').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    guests = Object.keys(data).map(key => data[key]);
                } else {
                    parseCSV(csvData);
                    const initialData = {};
                    guests.forEach(g => { initialData[g.id] = g; });
                    database.ref('guests').set(initialData);
                }
                renderList();
            });
        }

        function parseCSV(data) {
            const lines = data.trim().split('\n');
            for(let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(',');
                if(currentline[0]) {
                    const isPaid = (currentline[2] === "True" || currentline[2] === "VERO" || currentline[2] === "true");
                    const isOrg = (currentline[2] === "ORG");
                    const notComing = (currentline[3] && currentline[3].trim().toLowerCase() === "non viene");
                    
                    guests.push({
                        id: i,
                        nome: currentline[0] || "",
                        pagato: isPaid,
                        org: isOrg,
                        presenza: false,
                        gettone: false,
                        note: currentline[5] || "",
                        nonViene: notComing
                    });
                }
            }
        }

        function addGuest() {
            const name = prompt("Inserisci il Nome e Cognome del ritardatario:");
            if (name && name.trim() !== "") {
                const newId = Date.now();
                const newGuest = {
                    id: newId,
                    nome: name,
                    pagato: false,
                    org: false,
                    presenza: true,
                    gettone: false,
                    note: "Aggiunto all'ingresso",
                    nonViene: false
                };
                database.ref('guests/' + newId).set(newGuest);
                document.getElementById('search').value = "";
            }
        }

        function renderList(filterText = "") {
            const ul = document.getElementById('list');
            ul.innerHTML = '';

            // Ordina intelligentemente: chi ha completato tutto scivola in fondo alla lista!
            const sortedGuests = [...guests].sort((a, b) => {
                const aDone = a.presenza && a.gettone;
                const bDone = b.presenza && b.gettone;
                if (aDone && !bDone) return 1;
                if (!aDone && bDone) return -1;
                return 0;
            });

            sortedGuests.forEach(guest => {
                if(guest.nome.toLowerCase().includes(filterText.toLowerCase())) {
                    const isDone = guest.presenza && guest.gettone ? "done" : "";
                    
                    let badgeHTML = `<span class="badge" onclick="togglePayment(${guest.id})">NON PAGATO</span>`;
                    if (guest.pagato) badgeHTML = `<span class="badge paid" onclick="togglePayment(${guest.id})">PAGATO</span>`;
                    if (guest.org) badgeHTML = '<span class="badge org">STAFF/ORG</span>';

                    let notesHTML = '';
                    if (guest.note) notesHTML += `<div class="note">⚠️ Note: ${guest.note}</div>`;
                    if (guest.nonViene) notesHTML += `<div class="not-coming">❌ Segnato come: non viene</div>`;

                    ul.innerHTML += `
                        <li class="guest-card ${isDone}">
                            <div class="guest-header">
                                <span class="guest-name">${guest.nome}</span>
                                ${badgeHTML}
                            </div>
                            ${notesHTML}
                            <div class="controls">
                                <label class="toggle-label">
                                    Presenza
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'presenza')" ${guest.presenza ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                                <label class="toggle-label">
                                    Gettone
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleState(${guest.id}, 'gettone')" ${guest.gettone ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </label>
                            </div>
                        </li>
                    `;
                }
            });
        }

        function filterList() {
            const search = document.getElementById('search').value;
            renderList(search);
        }

        function toggleState(id, field) {
            const guest = guests.find(g => g.id == id);
            if (guest) {
                const newValue = !guest[field];
                database.ref('guests/' + id + '/' + field).set(newValue);
            }
        }

        function togglePayment(id) {
            const guest = guests.find(g => g.id == id);
            if (guest && !guest.org) {
                const newValue = !guest.pagato;
                database.ref('guests/' + id + '/pagato').set(newValue);
            }
        }

        init();
    </script>
